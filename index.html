<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CableFlow-AI Team Contacts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #E6F1FB 0%, #f0f6fc 50%, #ffffff 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .page { max-width: 900px; margin: 0 auto; }

    .hero {
      background: linear-gradient(135deg, #0C447C 0%, #185FA5 100%);
      border-radius: 18px;
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      box-shadow: 0 8px 32px rgba(12,68,124,0.18);
      animation: slideDown 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    .hero-left { display: flex; align-items: center; gap: 16px; }
    .logo-box {
      width: 52px; height: 52px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(55,138,221,0.6);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-box svg { width: 26px; height: 26px; }
    .wordmark { font-size: 24px; font-weight: 600; color: #fff; letter-spacing: -0.4px; }
    .wordmark span { color: #378ADD; }
    .tagline { font-size: 12px; color: #85B7EB; margin-top: 4px; }
    .badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 24px;
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 500;
      color: #B5D4F4;
      display: flex; align-items: center; gap: 7px;
      white-space: nowrap;
    }
    .badge svg { width: 14px; height: 14px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #378ADD;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 1.75rem;
      animation: fadeIn 0.5s 0.3s both;
    }

    .team-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .last-card {
      grid-column: 1 / -1;
    }

    .card {
      background: #fff;
      border: 1px solid #D4E8F7;
      border-radius: 16px;
      padding: 1.75rem 1.25rem 1.25rem;
      text-align: center;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: cardPop 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .card:nth-child(1) { animation-delay: 0.15s; }
    .card:nth-child(2) { animation-delay: 0.25s; }
    .card:nth-child(3) { animation-delay: 0.35s; }
    .card:nth-child(4) { animation-delay: 0.45s; }
    .card:nth-child(5) { animation-delay: 0.55s; }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #185FA5, #378ADD);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
    }
    .card:hover { border-color: #378ADD; transform: translateY(-5px); box-shadow: 0 14px 32px rgba(12,68,124,0.14); }
    .card:hover::before { transform: scaleX(1); }

    .avatar {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E6F1FB, #B5D4F4);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; color: #0C447C;
      margin: 0 auto 1rem;
      border: 2.5px solid #185FA5;
      box-shadow: 0 0 0 5px rgba(55,138,221,0.1);
      cursor: default;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.25s, transform 0.25s;
    }
    .card:hover .avatar {
      box-shadow: 0 0 0 7px rgba(55,138,221,0.18);
      transform: scale(1.07);
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(55,138,221,0.4);
      opacity: 0;
      animation: pulseRing 2.4s ease-out infinite;
    }
    .card:nth-child(1) .avatar::after { animation-delay: 0s; }
    .card:nth-child(2) .avatar::after { animation-delay: 0.5s; }
    .card:nth-child(3) .avatar::after { animation-delay: 1s; }
    .card:nth-child(4) .avatar::after { animation-delay: 1.5s; }
    .card:nth-child(5) .avatar::after { animation-delay: 0.3s; }

    .name { font-size: 15px; font-weight: 600; color: #0C447C; margin: 0 0 1rem; }

    .links {
      display: flex; justify-content: center; gap: 10px;
      padding-top: 1rem;
      border-top: 1px solid #EBF4FD;
    }
    .links a {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #EBF4FD;
      border: 1px solid #B5D4F4;
      display: flex; align-items: center; justify-content: center;
      color: #185FA5;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .links a svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; position: relative; z-index: 1; }
    .links a::before {
      content: '';
      position: absolute;
      inset: 100%;
      background: #185FA5;
      border-radius: 50%;
      transition: inset 0.25s cubic-bezier(0.22,1,0.36,1);
    }
    .links a:hover::before { inset: 0; }
    .links a:hover { border-color: #185FA5; transform: translateY(-2px); color: #fff; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes cardPop {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes pulseRing {
      0%   { opacity: 0.7; transform: scale(1); }
      80%  { opacity: 0; transform: scale(1.45); }
      100% { opacity: 0; transform: scale(1.45); }
    }
  </style>
